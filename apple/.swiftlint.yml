included:
  - Photonic
  - PhotonicTests
  - PhotonicUITests

excluded:
  - Photonic/Infrastructure/API/Generated
  - PhotonicClient
  - ${PWD}/**/.build
  - ${PWD}/**/DerivedData

disabled_rules:
  - todo
  - trailing_comma

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - force_unwrapping
  - last_where
  - literal_expression_end_indentation
  - modifier_order
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - to
    - at
    - by

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 80
  error: 150

file_length:
  warning: 500
  error: 800
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 25

nesting:
  type_level:
    warning: 3