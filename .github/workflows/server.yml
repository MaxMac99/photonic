name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'openapi.yaml'
      - 'openapi-3.0.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'openapi.yaml'
      - 'openapi-3.0.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - '.github/workflows/server.yml'

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # The default devshell cd's into ./server and sets up CARGO_HOME.
      # The .#test devshell additionally: initdb's a local Postgres under
      # server/tmpdata/.pgdata-test, starts it, creates the DB, runs sqlx
      # migrations, and exports DATABASE_URL / TEST_DATABASE_URL / OAUTH_*
      # / JWT_SECRET / STORAGE_* / RUST_LOG. All DB-dependent steps below
      # use .#test so the shellHook handles DB + env for them.

      - name: cargo fmt --check
        run: nix develop . --command cargo fmt --check

      - name: cargo clippy
        run: nix develop .#test --command cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: nix develop .#test --command cargo build --workspace --all-targets

      - name: cargo test
        run: nix develop .#test --command cargo test --workspace
