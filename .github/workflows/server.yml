name: Server CI

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'openapi.yaml'
      - 'openapi-3.0.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'openapi.yaml'
      - 'openapi-3.0.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.cargo/**'
      - 'rustfmt.toml'
      - '.github/workflows/server.yml'

concurrency:
  group: server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, build, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: photonic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/photonic_test
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/photonic_test
      OAUTH_CLIENT_ID: test-client-id
      OAUTH_JWKS_URL: https://example.com/.well-known/jwks.json
      OAUTH_TOKEN_URL: https://example.com/oauth/token
      OAUTH_AUTHORIZE_URL: https://example.com/oauth/authorize
      JWT_SECRET: test-secret-key-for-testing-only
      RUST_LOG: info
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # The flake's default devshell shellHook cd's into ./server, so all
      # cargo commands run against server/Cargo.toml without needing
      # --manifest-path. Run everything from the repo root.

      - name: Run migrations
        run: nix develop .#test --command cargo sqlx migrate run --source crates/infrastructure/migrations

      - name: cargo fmt --check
        run: nix develop . --command cargo fmt --check

      - name: cargo clippy
        run: nix develop . --command cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: nix develop . --command cargo build --workspace --all-targets

      - name: cargo test
        run: nix develop . --command cargo test --workspace
        env:
          STORAGE_BASE_DIRECTORY: ${{ github.workspace }}/server/tmpdata/test-storage
          STORAGE_CACHE_DIRECTORY: ${{ github.workspace }}/server/tmpdata/test-cache
          STORAGE_TEMP_DIRECTORY: ${{ github.workspace }}/server/tmpdata/test-tmp
