name: Apple CI

on:
  push:
    branches: [main]
    paths:
      - 'apple/**'
      - 'openapi.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/apple.yml'
  pull_request:
    paths:
      - 'apple/**'
      - 'openapi.yaml'
      - 'asyncapi.yaml'
      - 'flake.nix'
      - 'flake.lock'
      - '.github/workflows/apple.yml'

concurrency:
  group: apple-${{ github.ref }}
  cancel-in-progress: true

jobs:
  style:
    name: SwiftLint & SwiftFormat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      # The default devshell shellHook cd's into ./server, so we explicitly
      # cd back into apple/ before invoking the tools. swiftlint and
      # swiftformat are provided by the default devshell (see flake.nix).

      - name: SwiftLint
        run: nix develop --command bash -c 'cd "$GITHUB_WORKSPACE/apple" && swiftlint lint --strict --reporter github-actions-logging'

      - name: SwiftFormat (lint)
        run: nix develop --command bash -c 'cd "$GITHUB_WORKSPACE/apple" && swiftformat --lint .'
